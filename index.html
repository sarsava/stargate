<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stargate LLP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000000;
            font-family: 'EB Garamond', 'Garamond', 'Times New Roman', serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Star field canvas */
        canvas#stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 400;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-top: -8vh;
            user-select: none;
        }

        .founders {
            position: absolute;
            bottom: 18vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10vw;
        }

        .founder {
            user-select: none;
        }

        .founder-name {
            font-size: clamp(1rem, 2.2vw, 1.65rem);
            font-weight: 400;
            letter-spacing: 0.05em;
            margin-bottom: 0.25em;
        }

        .founder-role {
            font-size: clamp(0.75rem, 1.4vw, 1.05rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            opacity: 0.7;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .founders {
                flex-direction: column;
                align-items: center;
                gap: 2.5rem;
                bottom: 12vh;
                padding: 0;
            }
            .founder {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>

    <div class="content">
        <h1 class="title">Stargate</h1>

        <div class="founders">
            <div class="founder">
                <div class="founder-name">Kalp Sarsava</div>
                <div class="founder-role">Founding Partner</div>
            </div>
            <div class="founder">
                <div class="founder-name">Akshaj Srivastava</div>
                <div class="founder-role">Founding Partner</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');

        let stars = [];
        let w, h, dpr;

        // Pivot point: bottom-left corner
        const pivotX = 0;
        const pivotY = () => h;

        function initStars() {
            dpr = window.devicePixelRatio || 1;
            w = window.innerWidth * dpr;
            h = window.innerHeight * dpr;
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';

            stars = [];
            // We need enough stars across the FULL circle so the visible
            // quadrant (top-right from pivot) is always populated.
            // Visible area is roughly 1/4 of the full orbit circle,
            // so we generate ~4x more stars spread across all 360°.
            const area = w * h;
            const visibleStarCount = Math.floor(area / 2800);
            const totalStars = visibleStarCount * 4;

            const maxRadius = Math.sqrt(w * w + h * h) * 1.2;

            let seed = 42;
            function seededRandom() {
                seed = (seed * 16807 + 0) % 2147483647;
                return (seed - 1) / 2147483646;
            }

            for (let i = 0; i < totalStars; i++) {
                // Distribute across full 360° and random radii
                const angle = seededRandom() * Math.PI * 2 - Math.PI;
                const radius = seededRandom() * maxRadius;

                // Slower speed (0.75x), slight variation by distance
                const speed = 0.75 * (0.0001 + seededRandom() * 0.0002) * (1 + 0.5 * (1 - radius / maxRadius));

                stars.push({
                    radius: radius,
                    angle: angle,
                    speed: speed,
                    size: seededRandom() * 1.2 + 0.2,
                    opacity: seededRandom() * 0.6 + 0.15
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);

            const py = pivotY();

            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                s.angle += s.speed;
                // Wrap angle for infinite looping
                if (s.angle > Math.PI) s.angle -= Math.PI * 2;

                const x = pivotX + s.radius * Math.cos(s.angle);
                const y = py + s.radius * Math.sin(s.angle);

                // Only draw if on screen (skip off-screen stars for performance)
                if (x >= -5 && x <= w + 5 && y >= -5 && y <= h + 5) {
                    ctx.beginPath();
                    ctx.arc(x, y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                    ctx.fill();
                }
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initStars);
        initStars();
        animate();
    </script>
</body>
</html>
