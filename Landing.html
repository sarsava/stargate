<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stargate LLP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #000000;
            font-family: 'EB Garamond', 'Garamond', 'Times New Roman', serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Star field canvas */
        canvas#stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 400;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin-top: -8vh;
            user-select: none;
        }

        .founders {
            position: absolute;
            bottom: 18vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10vw;
        }

        .founder {
            user-select: none;
        }

        .founder-name {
            font-size: clamp(1rem, 2.2vw, 1.65rem);
            font-weight: 400;
            letter-spacing: 0.05em;
            margin-bottom: 0.25em;
        }

        .founder-role {
            font-size: clamp(0.75rem, 1.4vw, 1.05rem);
            font-weight: 400;
            letter-spacing: 0.08em;
            opacity: 0.7;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .founders {
                flex-direction: column;
                align-items: center;
                gap: 2.5rem;
                bottom: 12vh;
                padding: 0;
            }
            .founder {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>

    <div class="content">
        <h1 class="title">Stargate</h1>

        <div class="founders">
            <div class="founder">
                <div class="founder-name">Kalp Sarsava</div>
                <div class="founder-role">Founding Partner</div>
            </div>
            <div class="founder">
                <div class="founder-name">Akshaj Srivastava</div>
                <div class="founder-role">Founding Partner</div>
            </div>
        </div>
    </div>

    <script>
        // Static star field
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            drawStars();
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const area = canvas.width * canvas.height;
            const starCount = Math.floor(area / 2800);

            // Seed-like deterministic random for consistency
            let seed = 42;
            function seededRandom() {
                seed = (seed * 16807 + 0) % 2147483647;
                return (seed - 1) / 2147483646;
            }

            for (let i = 0; i < starCount; i++) {
                const x = seededRandom() * canvas.width;
                const y = seededRandom() * canvas.height;
                const radius = seededRandom() * 1.2 + 0.2;
                const opacity = seededRandom() * 0.6 + 0.15;

                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.fill();
            }
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
